# Repository Type
repository.type=database

# Environment
app.env=development

# Database Configuration
db.url=jdbc:h2:mem:quantitymeasurement
db.username=sa
db.password=
db.driver=org.h2.Driver

# Connection Pool
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.timeout=30000

# Logging
logging.level.root=INFO
logging.level.com.quantitymeasurement=DEBUG